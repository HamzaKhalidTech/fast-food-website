<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
  <link rel="stylesheet" href="style.css" />
  <title>Foodie - Checkout</title>
</head>
<body>

<header>
  <nav class="navbar flex between wrapper">
    <a href="index.html" class="logo">Foodie.</a>
    <ul class="navlist flex gap-3">
      <li><a href="index.html">Home</a></li>
      <li><a href="menu.html">Menu</a></li>
      <li><a href="cart.html">Cart</a></li>
      <li><a href="admin.html">Admin</a></li>
      <li>
        <a href="cart.html" class="cart-icon">
          <i class="fa-solid fa-bag-shopping"></i><span class="cart-value">0</span>
        </a>
      </li>
    </ul>

    <a href="#" class="hamburger" id="hamburgerBtn"><i class="fa-solid fa-bars"></i></a>
    <ul class="mobile-menu" id="mobileMenu">
      <li><a href="index.html">Home</a></li>
      <li><a href="menu.html">Menu</a></li>
      <li><a href="cart.html">Cart</a></li>
      <li><a href="admin.html">Admin</a></li>
    </ul>
  </nav>
</header>

<main class="wrapper p-top cart-wrap">
  <div class="text-center">
    <h5>Checkout</h5>
    <h2>Delivery Details</h2>
  </div>

  <div class="total-box mt-4">
    <h3>Total</h3>
    <h3 id="checkoutTotal">$0</h3>
  </div>

  <form class="form mt-2" id="checkoutForm">
    <div class="row">
      <div class="input">
        <label>Full Name</label>
        <input name="name" type="text" placeholder="Your name" />
      </div>
      <div class="input">
        <label>Phone</label>
        <input name="phone" type="text" placeholder="03xxxxxxxxx" />
      </div>
    </div>

    <div class="input">
      <label>Address</label>
      <textarea name="address" placeholder="Full delivery address"></textarea>
    </div>

    <button class="btn mt-2" type="submit">Place Order</button>
    <div class="msg" id="checkoutMsg"></div>
  </form>
</main>

<footer>© 2026 Foodie. All rights reserved.</footer>
<script src="main.js"></script>
</body>
</html>
